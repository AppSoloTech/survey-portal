# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - njsda-wa

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Only the newest push should reach the Web App; cancel superseded runs so a
# slow older deploy can never overwrite a newer one.
concurrency:
  group: deploy-njsda-wa
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    # Disposable database for the API test suite. Matches the Azure server's
    # major version (PostgreSQL 18) and the test harness's default URL; the
    # harness refuses any database whose name does not contain "test".
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: survey_portal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js version
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Validate release notes
        run: |
          if [ -n "${{ github.event.before }}" ]; then
            npm run release:check -- --since "${{ github.event.before }}"
          else
            npm run release:check
          fi

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v3

      # Tests must run before the prune strips devDependencies (vitest,
      # supertest). Type checking is covered by tsc inside each workspace
      # build. A red step fails this job, and deploy needs build, so
      # failing tests block the Azure deploy.
      - name: Install, lint, build, and test
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/survey_portal_test
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
          npm run lint
          npm run build
          npm test

      - name: Prune to production dependencies
        run: npm prune --omit=dev

      # Uploading the raw tree (node_modules is hundreds of thousands of
      # small files) makes artifact upload/download take 30+ minutes; a
      # single zip keeps the pipeline fast. zip follows the workspace
      # symlinks in node_modules so the target needs no symlink support.
      - name: Package app into a single zip artifact
        run: zip -r -q release.zip . -x '.git/*' -x '.github/*'

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F2B7FCBA992841538DA7C96960BF6CC7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1F651CCE3F35472D833C5A8F9A7B83DC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5F3C2E4EDE0A4338A8C1AAE5CF69E7FE }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'njsda-wa'
          slot-name: 'Production'
          package: release.zip
